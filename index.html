<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dodge — Falling Objects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #05070f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            touch-action: pan-x pan-y;
        }

        .game-wrapper {
            padding: 16px;
            width: 100%;
            max-width: 500px;
        }

        .game-container {
            background: #0f1322;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #060812;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #8a90b0;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        canvas {
            display: block;
            width: 100%;
            background: #01010a;
            border-radius: 32px;
            cursor: pointer;
            touch-action: none;
        }

        .controls-info {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            gap: 12px;
        }

        .control-btn {
            flex: 1;
            background: #1e243f;
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .control-btn:active {
            background: #2e3555;
        }

        .restart-btn {
            background: #ff5e00;
            box-shadow: 0 2px 10px rgba(255,94,0,0.3);
        }

        .status {
            text-align: center;
            margin-top: 16px;
            font-weight: bold;
            color: #ffae70;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="scoreValue">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="bestValue">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="500" style="width:100%; height:auto; aspect-ratio:400/500"></canvas>

        <div class="controls-info">
            <button class="control-btn" id="leftBtn">◀ LEFT</button>
            <button class="control-btn restart-btn" id="restartBtn">🔄 RESTART</button>
            <button class="control-btn" id="rightBtn">RIGHT ▶</button>
        </div>
        <div class="status" id="gameStatus">👇 Tap LEFT or RIGHT to move</div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let canvasWidth = 400;
        let canvasHeight = 500;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        let gameRunning = true;
        let score = 0;
        let bestScore = localStorage.getItem('dodgeBest') ? parseInt(localStorage.getItem('dodgeBest')) : 0;
        document.getElementById('bestValue').innerText = bestScore;

        const PLAYER_WIDTH = 55;
        const PLAYER_HEIGHT = 22;
        let playerX = (canvasWidth - PLAYER_WIDTH) / 2;
        const playerY = canvasHeight - PLAYER_HEIGHT - 10;

        let objects = [];
        const OBJECT_SIZE = 26;
        let frameCounter = 0;
        let spawnRate = 45;
        
        let lastTouchX = playerX;
        const scoreSpan = document.getElementById('scoreValue');
        const gameStatusDiv = document.getElementById('gameStatus');

        function updateUI() {
            scoreSpan.innerText = score;
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('dodgeBest', bestScore);
                document.getElementById('bestValue').innerText = bestScore;
            }
        }

        function spawnObject() {
            let randX = Math.random() * (canvasWidth - OBJECT_SIZE);
            objects.push({
                x: randX,
                y: -OBJECT_SIZE,
                size: OBJECT_SIZE
            });
        }

        function resetGame() {
            gameRunning = true;
            score = 0;
            objects = [];
            frameCounter = 0;
            spawnRate = 45;
            playerX = (canvasWidth - PLAYER_WIDTH) / 2;
            updateUI();
            gameStatusDiv.innerText = "🎮 Dodge! Survive as long as you can!";
            gameStatusDiv.style.color = "#88ff88";
        }

        function endGame() {
            gameRunning = false;
            gameStatusDiv.innerText = "💀 GAME OVER — Press RESTART 💀";
            gameStatusDiv.style.color = "#ff8888";
        }

        function updateGame() {
            if (!gameRunning) return;

            frameCounter++;
            if (frameCounter >= spawnRate) {
                frameCounter = 0;
                spawnObject();
                if (spawnRate > 25) spawnRate -= 0.15;
            }

            for (let i = 0; i < objects.length; i++) {
                const obj = objects[i];
                obj.y += 4.2;

                // SMALLER hitbox for fairness
                if (obj.y + OBJECT_SIZE - 5 > playerY &&
                    obj.y + 5 < playerY + PLAYER_HEIGHT &&
                    obj.x + OBJECT_SIZE - 8 > playerX &&
                    obj.x + 8 < playerX + PLAYER_WIDTH) {
                    endGame();
                    return;
                }
            }

            let newObjects = [];
            for (let obj of objects) {
                if (obj.y < canvasHeight) {
                    newObjects.push(obj);
                } else {
                    score++;
                    updateUI();
                }
            }
            objects = newObjects;

            if (playerX < 0) playerX = 0;
            if (playerX + PLAYER_WIDTH > canvasWidth) playerX = canvasWidth - PLAYER_WIDTH;
        }

        function draw() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            ctx.fillStyle = "#01010a";
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            for (let obj of objects) {
                const grad = ctx.createLinearGradient(obj.x, obj.y, obj.x+OBJECT_SIZE, obj.y+OBJECT_SIZE);
                grad.addColorStop(0, '#e03a3a');
                grad.addColorStop(1, '#a01010');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 6;
                ctx.shadowColor = "red";
                ctx.fillRect(obj.x, obj.y, OBJECT_SIZE, OBJECT_SIZE);
                ctx.fillStyle = "#ff8080";
                ctx.fillRect(obj.x+6, obj.y+6, OBJECT_SIZE-12, OBJECT_SIZE-12);
            }
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = "#3ac0ff";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#00a6ff";
            ctx.fillRect(playerX, playerY, PLAYER_WIDTH, PLAYER_HEIGHT);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(playerX+10, playerY+5, PLAYER_WIDTH-20, 6);
            
            ctx.strokeStyle = "#3a506c";
            ctx.lineWidth = 2;
            ctx.strokeRect(2, 2, canvasWidth-4, canvasHeight-4);
            ctx.shadowBlur = 0;
            
            if (!gameRunning) {
                ctx.font = "bold 24px system-ui";
                ctx.fillStyle = "#ffffffcc";
                ctx.fillText("GAME OVER", canvasWidth/2-85, canvasHeight/2-30);
            }
        }

        function movePlayer(deltaX) {
            if (!gameRunning) return;
            playerX += deltaX;
            if (playerX < 0) playerX = 0;
            if (playerX + PLAYER_WIDTH > canvasWidth) playerX = canvasWidth - PLAYER_WIDTH;
            lastTouchX = playerX;
        }

        function handleCanvasTap(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width;
            let clientX;
            if (e.touches) {
                clientX = e.touches[0].clientX;
            } else {
                clientX = e.clientX;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            if (canvasX < canvasWidth/2) {
                movePlayer(-48);
            } else {
                movePlayer(48);
            }
        }

        document.getElementById('leftBtn').addEventListener('click', (e) => {
            e.preventDefault();
            movePlayer(-50);
        });
        document.getElementById('rightBtn').addEventListener('click', (e) => {
            e.preventDefault();
            movePlayer(50);
        });
        document.getElementById('restartBtn').addEventListener('click', (e) => {
            resetGame();
        });
        
        canvas.addEventListener('touchstart', handleCanvasTap);
        canvas.addEventListener('mousedown', handleCanvasTap);
        canvas.addEventListener('dragstart', (e) => e.preventDefault());
        
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        resetGame();
        gameLoop();
    })();
</script>
</body>
</html>
